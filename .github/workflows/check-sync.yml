name: check-sync
# Release gate: validate the runtime router, flat direct references, client/plugin metadata,
# evaluation fixtures, scripts, links, and repository contract on every PR and main update.
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-sync
