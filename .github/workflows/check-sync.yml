name: check-sync
# Release gate, enforced not trusted: every PR (and main) must keep the SKILL.md version in
# sync across frontmatter/body/CHANGELOG, every reference file linked with no orphans, every
# cross-link and anchor resolved, and the internal-tooling leakage guard clean. The check
# itself lives in scripts/check-sync.
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-sync
