<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>orchestrate — OG image source</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    background:#12151d;
    background-image:
      radial-gradient(circle at 82% 18%, rgba(111,147,255,0.16), transparent 42%),
      radial-gradient(circle at 8% 92%, rgba(111,147,255,0.10), transparent 46%);
    color:#e6eaf3;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    position:relative;
  }
  .frame{
    position:absolute; inset:40px;
    border:1px solid #2b3245;
    border-radius:18px;
  }
  .content{
    position:absolute; inset:0;
    display:flex; flex-direction:column; justify-content:center;
    padding:0 96px;
  }
  .eyebrow{
    font-family:"Avenir Next Condensed","Arial Narrow",system-ui,sans-serif;
    text-transform:uppercase; letter-spacing:.18em; font-weight:600;
    font-size:19px; color:#93a0b8; margin-bottom:22px;
  }
  h1{
    font-size:108px; font-weight:500; letter-spacing:-.02em; line-height:1;
    margin-bottom:26px;
  }
  h1 .sl{color:#6f93ff}
  .sub{
    font-family:"Avenir Next Condensed","Arial Narrow",system-ui,sans-serif;
    font-size:30px; color:#93a0b8; letter-spacing:.01em; margin-bottom:44px;
  }
  .glyphs{display:flex; align-items:center; gap:34px}
  .glyphs .lbl{font-size:15px; color:#5d6a85; letter-spacing:.05em}
</style>
</head>
<body>
  <div class="frame"></div>

</html>
